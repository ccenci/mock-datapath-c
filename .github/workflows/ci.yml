name: C CI Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y gcc make

    - name: Build the project
      run: make

    - name: Run the mock datapath
      run: ./mock_datapath

    - name: Notify OpenClaw Webhook on Failure
      if: failure()
      run: |
        echo "Sending webhook to OpenClaw with commit hash..."
        curl -X POST -H "Content-Type: application/json" -d "{\"commit_hash\": \"${{ github.sha }}\"}" http://openclaw-webhook.example.com/ci-failure || true

