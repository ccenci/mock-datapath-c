name: C CI Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y gcc make

    - name: Build the project
      run: make

    - name: Run the mock datapath
      run: ./mock_datapath

    - name: Analyze Failure and Blame
      if: failure()
      run: |
        echo "Build failed. Analyzing root cause..."
        # Run make and capture the error
        make 2> error.log || true
        
        # Extract file and line number
        ERROR_LINE=$(grep -m 1 "error:" error.log || true)
        if [ -n "$ERROR_LINE" ]; then
          FILE=$(echo "$ERROR_LINE" | cut -d':' -f1)
          LINE=$(echo "$ERROR_LINE" | cut -d':' -f2)
          
          echo "Root cause found in $FILE at line $LINE."
          
          # Run git blame
          BLAME=$(git blame -L "$LINE,$LINE" --line-porcelain "$FILE" | grep "^author " | cut -d' ' -f2-)
          
          MESSAGE="Build failed on ${{ github.sha }}. Root cause: $ERROR_LINE. Blame: @[$BLAME]. Suggestion: Revert commit ${{ github.sha }}."
          echo "$MESSAGE"
          
          # Simulate sending this specific message to OpenClaw
          curl -X POST -H "Content-Type: application/json" -d "{\"message\": \"$MESSAGE\"}" http://openclaw-webhook.example.com/ci-failure || true
        else
          echo "Could not parse exact error line."
          cat error.log
        fi


